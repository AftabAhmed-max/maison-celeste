<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1a2d5a"/>
    </linearGradient>
  </defs>
  <!-- Background with subtle rounded corners -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Thin gold border -->
  <rect width="100" height="100" rx="18" fill="none" stroke="#B8935A" stroke-width="2.5" opacity="0.6"/>

  <!-- M letter -->
  <!-- Left leg -->
  <rect x="10" y="22" width="10" height="56" fill="#B8935A"/>
  <!-- Right leg -->
  <rect x="43" y="22" width="10" height="56" fill="#B8935A"/>
  <!-- Left diagonal arm -->
  <polygon points="20,22 30,22 36,44 26,44" fill="#B8935A"/>
  <!-- Right diagonal arm -->
  <polygon points="43,22 53,22 47,44 37,44" fill="#B8935A"/>
  <!-- Center V fill -->
  <polygon points="26,44 36,44 31.5,54 31.5,54" fill="#B8935A"/>

  <!-- C letter -->
  <!-- Top bar -->
  <rect x="60" y="22" width="31" height="10" rx="2" fill="#B8935A"/>
  <!-- Left bar -->
  <rect x="60" y="22" width="10" height="56" fill="#B8935A"/>
  <!-- Bottom bar -->
  <rect x="60" y="68" width="31" height="10" rx="2" fill="#B8935A"/>

  <!-- Gold dot accent between M and C -->
  <circle cx="57" cy="50" r="2.5" fill="#B8935A" opacity="0.5"/>
</svg>
